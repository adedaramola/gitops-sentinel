name: Policy Check (Allowed Actions)

on:
  pull_request:
    paths:
      - "gitops/**"

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Enforce simple bounds
        run: |
          python - <<'PY'
          import yaml, re, pathlib, sys
          allowed = yaml.safe_load(pathlib.Path("gitops/policies/allowed-actions.yaml").read_text())
          max_rep = None
          for a in allowed.get("allowed_actions", []):
            if a.get("action") == "scale_replicas":
              max_rep = a.get("constraints", {}).get("max")
          if max_rep is None:
            print("No replica bound found; skipping")
            sys.exit(0)
          # naive parse of overlay kustomization for 'value: <int>' line
          for env in ["staging","prod"]:
            p = pathlib.Path(f"gitops/apps/demo-service/overlays/{env}/kustomization.yaml")
            if not p.exists(): 
              continue
            txt = p.read_text()
            m = re.search(r"^\s*value:\s*(\d+)\s*$", txt, re.M)
            if m:
              rep = int(m.group(1))
              if rep > int(max_rep):
                raise SystemExit(f"{env} replicas {rep} exceeds max {max_rep}")
          print("Policy OK")
          PY
