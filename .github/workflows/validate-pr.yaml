name: Validate GitOps PR

on:
  pull_request:
    paths:
      - "gitops/**"
      - "observability/**"
      - "lambdas/**"
      - "terraform/**"

jobs:
  validate-gitops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Build staging manifests
        run: kustomize build gitops/clusters/staging > /tmp/staging.yaml

      - name: Build prod manifests
        run: kustomize build gitops/clusters/prod > /tmp/prod.yaml

      - name: Basic YAML sanity check
        run: |
          python - <<'PY'
          import sys, yaml
          for p in ["/tmp/staging.yaml", "/tmp/prod.yaml"]:
            with open(p, "r") as f:
              list(yaml.safe_load_all(f))
          print("OK")
          PY

  check-lambda-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if Lambda sources are out of sync with Terraform modules
        run: |
          for fn in signal_collector decision_engine outcome_validator classifier_agent root_cause_agent action_planner confidence_scorer; do
            diff lambdas/$fn/app.py terraform/modules/lambda_$fn/src/app.py || \
              (echo "ERROR: $fn source drifted — run 'make sync-lambda' and commit." && exit 1)
          done

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=terraform validate

  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - name: Init tflint
        run: tflint --init
        working-directory: terraform
      - name: Run tflint
        run: tflint --recursive
        working-directory: terraform

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit (medium+ severity)
        run: bandit -r lambdas/ -ll --exclude lambdas/tests

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r lambdas/requirements.txt
          pip install -r lambdas/requirements-dev.txt
      - name: Run unit tests with coverage
        run: |
          cd lambdas && python -m pytest tests/ -v \
            --cov=signal_collector.app --cov=decision_engine.app --cov=outcome_validator.app \
            --cov=classifier_agent.app --cov=root_cause_agent.app \
            --cov=action_planner.app   --cov=confidence_scorer.app \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --tb=short
