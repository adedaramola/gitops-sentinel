name: Validate GitOps PR

on:
  pull_request:
    paths:
      - "gitops/**"
      - "observability/**"
      - "lambdas/**"
      - "terraform/**"

jobs:
  validate-gitops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Build staging manifests
        run: kustomize build gitops/clusters/staging > /tmp/staging.yaml

      - name: Build prod manifests
        run: kustomize build gitops/clusters/prod > /tmp/prod.yaml

      - name: Basic YAML sanity check
        run: |
          python - <<'PY'
          import sys, yaml
          for p in ["/tmp/staging.yaml", "/tmp/prod.yaml"]:
            with open(p, "r") as f:
              list(yaml.safe_load_all(f))
          print("OK")
          PY

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r lambdas/requirements.txt
          pip install -r lambdas/requirements-dev.txt
      - name: Run unit tests with coverage
        run: |
          cd lambdas && python -m pytest tests/ -v \
            --cov=signal_collector --cov=decision_engine --cov=outcome_validator \
            --cov=classifier_agent --cov=root_cause_agent \
            --cov=action_planner   --cov=confidence_scorer \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --tb=short
